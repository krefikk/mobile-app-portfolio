<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Taksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #17114A; 
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-color: #B2FF4A;
            --accent-hover: #9BE53E;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-attachment: fixed; 
        }

        .container {
            max-width: 420px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0 0 40px 0;
        }

        .download-btn {
            background-color: var(--accent-color);
            color: #17114A;
            text-decoration: none;
            font-weight: 700;
            font-size: 17px;
            padding: 18px 32px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(178, 255, 74, 0.25);
        }

        .download-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(178, 255, 74, 0.2);
        }

        .download-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .warning-text {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="SATtaksi.png" alt="SAT Taksi Logo" class="app-icon">
        
        <h1 class="title">SAT Taksi</h1>
        
        <p class="description">
            Akıllı ulaşım teknolojileriyle hızlı, güvenli ve şeffaf bir yolculuk deneyimi için.
            <br>Yalnızca Android cihazlarla uyumludur.
        </p>
      
        <a href="SatTaksi-debug-1.0.apk" class="download-btn" download>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            APK'yı İndir
        </a>

        <p class="warning-text">
            * Uygulama Play Store'da yer almadığı için kurulum sırasında telefonunuz "Bilinmeyen Kaynaklar" uyarısı verebilir. Güvenle izin verebilirsiniz.
        </p>
    </div>

</body>
</html>
